spring:
  application:
    name: FoodFlow
  datasource:
    url: jdbc:postgresql://localhost:5432/foodflow
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

